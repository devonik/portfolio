faq:
  title: Frequently Asked Questions
  description: Answers to common questions about my process and services.
  categories:
    - title: Services & Process
      questions:
        - label: What kind of projects do you take on?
          content: |
            I work on web applications, SaaS platforms, B2B products, and AI-powered tools — end-to-end. That means I can own the full stack: frontend, backend, infrastructure, and deployment.

            Typical engagements include:
            - Building new products from scratch (Vue/Nuxt + Node.js/NestJS + AWS)
            - Vue 2 → Vue 3 / Nuxt migrations
            - Monolith → microservices decomposition
            - Integrating AI/LLM capabilities into existing products
            - WordPress → Headless CMS migrations
            - Mobile apps with React Native
        - label: How do you typically work with clients?
          content: |
            I work fully remote and async-first. Most of my clients are in Europe or the Americas — my timezone flexibility as a digital nomad means I can overlap with both.

            In practice: I integrate into your existing workflow (GitHub/GitLab, Linear, Jira, Slack), communicate proactively, and don't need hand-holding to get started. I'm used to being the only external engineer on a team, or embedded in a larger dev team.
        - label: Do you work as a contractor or project-based?
          content: |
            Both. I operate through my US LLC (Devnik LLC), which makes invoicing straightforward for international clients.

            - **Contractor (hourly/daily):** Ongoing work, flexible scope — ideal for product teams needing a reliable senior engineer
            - **Project-based (fixed price):** Works well for well-defined scopes like migrations, MVPs, or specific feature builds

    - title: Pricing & Timelines
      questions:
        - label: What is your rate?
          content: |
            My standard rate is **85 €/h** (day rate: 680 €). For US/international clients billed in USD, we can align on an equivalent.

            For longer engagements or retainers, I'm open to discussing adjusted terms. Feel free to reach out — I'm flexible depending on the project fit.
        - label: Do you offer fixed-price projects?
          content: |
            Yes, for well-defined scopes. After an initial discovery call where we align on requirements, I'll provide a detailed estimate with a clear timeline. Fixed-price works best for migrations, MVPs, or specific feature builds with stable requirements.
        - label: How quickly can you start?
          content: |
            I'm currently available and can typically start within 1–2 weeks depending on your onboarding process. [Get in touch](mailto:niklas.grieger@devnik.dev) or [schedule a call](https://cal.com/devnik) to discuss your timeline.

    - title: Tech & Expertise
      questions:
        - label: What is your primary tech stack?
          content: |
            **Frontend**
            Vue.js (2 & 3), Nuxt.js, TypeScript, Pinia, Vuetify, TailwindCSS, React, React Native

            **Backend**
            Node.js, NestJS, Java Spring Boot, REST APIs, GraphQL

            **Cloud & DevOps**
            AWS (Lambda, EC2, Beanstalk, S3, OpenSearch, API Gateway, Cognito, EventBridge, SNS/SQS, CDK), Docker, Kubernetes, Terraform, GitLab CI/CD

            **Databases**
            PostgreSQL, Redis, Supabase, DynamoDB

            **AI & Tooling**
            Claude Code, DeepSeek LLM (self-hosted), OpenAI API, Crawl4AI, Algolia, Storybook
        - label: Can you handle both frontend and backend?
          content: |
            Yes — this is actually one of my main strengths. I've spent 8+ years working across the full stack, which means I can own features end-to-end without creating handoff friction between frontend and backend. I'm most specialized in Vue/Nuxt on the frontend and Node.js/NestJS on the backend, with solid Java Spring Boot experience for enterprise contexts.
        - label: Do you have experience with AI integrations?
          content: |
            Yes, hands-on. I've built an embeddable AI avatar chat plugin (users upload PDFs, an AI avatar speaks the answers), set up a self-hosted DeepSeek LLM on AWS EC2 as a cost-efficient ChatGPT alternative, built an automated web crawling pipeline with AI-assisted data extraction, and I use Claude Code daily in my development workflow.