title: WordPress to Strapi Migration & Next.js Rebuild for AWARE7
description: |
  Migrated a WordPress site with 1,000+ posts, Custom Post Types, WPML translations, menus and categories to a Strapi headless CMS. Built intelligent media cleanup (only actually used assets transferred) and a new React/Next.js frontend with Stripe integration. This project became the foundation for WPShift, an open-source migration tool currently in development.

  **Tech:** React, Next.js, Strapi, Stripe, WordPress
